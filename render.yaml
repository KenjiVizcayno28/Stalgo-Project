services:
  - type: web
    name: final-project-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate --noinput
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOW_ALL_ORIGINS
        value: false

  - type: web
    name: final-project-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s build -l $PORT
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: REACT_APP_API_BASE_URL
        value: https://your-backend-domain.onrender.com
